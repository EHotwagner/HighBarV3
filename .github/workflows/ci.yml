# SPDX-License-Identifier: GPL-2.0-only
#
# HighBarV3 CI pipeline (T104).
#
# Gates every PR and merge on:
#   - C++ plugin build (vcpkg manifest mode)
#   - buf codegen for proto/highbar/*.proto
#   - GoogleTest unit + integration suites
#   - F# dotnet build + dotnet test
#   - Python pip install + pytest
#   - UDS + TCP latency benches (Constitution V gates)
#   - Phase 2 smoke + US1 observer + US2 ai-coexist + US4 tcp headless
#     scripts (all skip on absent spring-headless, but failure in the
#     ones that DO run is a merge blocker)
#
# Runner: Ubuntu 24.04 (matches plan §Technical Context reference
# distro). Arch linux devs should verify locally before pushing.

name: ci

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            autoconf libtool zlib1g-dev \
            python3.11 python3.11-venv python3-pip

      - name: Install buf
        run: |
          BUF_VERSION=1.39.0
          curl -sSL -o /tmp/buf \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64"
          chmod +x /tmp/buf
          sudo mv /tmp/buf /usr/local/bin/buf

      - name: Install vcpkg
        env:
          VCPKG_ROOT: /opt/vcpkg
        run: |
          sudo git clone --depth 1 https://github.com/microsoft/vcpkg /opt/vcpkg
          sudo /opt/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=/opt/vcpkg" >> "$GITHUB_ENV"
          echo "/opt/vcpkg" >> "$GITHUB_PATH"

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate protobuf stubs
        run: |
          cd proto
          buf lint
          buf generate

      - name: Configure + build plugin
        env:
          VCPKG_ROOT: /opt/vcpkg
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake
          cmake --build build --parallel

      - name: C++ unit + integration tests
        run: |
          cd build && ctest --output-on-failure

      - name: F# build + test
        run: |
          cd clients/fsharp
          dotnet build -c Release
          dotnet test -c Release --no-build

      - name: Python install + pytest
        run: |
          python3.11 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e 'clients/python[test]'
          # Point pytest at the generated stubs emitted by `buf generate`.
          export PYTHONPATH="$GITHUB_WORKSPACE/build/gen/python:$PYTHONPATH"
          pytest clients/python/tests -v

      - name: Phase 2 smoke
        run: bash tests/headless/phase2-smoke.sh || test $? -eq 77

      - name: US1 observer acceptance
        run: bash tests/headless/us1-observer.sh || test $? -eq 77

      - name: US2 AI-coexist acceptance
        run: bash tests/headless/us2-ai-coexist.sh || test $? -eq 77

      - name: US3 external-only acceptance
        run: |
          bash tests/headless/us3-external-only.sh    || test $? -eq 77
          bash tests/headless/us3-external-only-ai.sh || test $? -eq 77

      - name: US4 TCP acceptance
        run: bash tests/headless/us4-tcp.sh || test $? -eq 77

      - name: US6 reconnect acceptance
        run: bash tests/headless/us6-reconnect.sh || test $? -eq 77

      - name: Symbol-visibility guard
        run: bash tests/headless/symbol-visibility-check.sh || test $? -eq 77

      - name: UDS latency gate (Constitution V)
        run: bash tests/bench/latency-uds.sh || test $? -eq 77

      - name: TCP latency gate (Constitution V)
        run: bash tests/bench/latency-tcp.sh || test $? -eq 77

      # NOTE: the `|| test $? -eq 77` idiom lets scripts skip when
      # spring-headless / the plugin .so / the F# binaries are not
      # present on this runner — same semantics as autotools'
      # EXIT_SKIP convention. When T104's engine-launch helper lands
      # and the runner image ships spring-headless, the `|| test …`
      # suffix becomes a no-op: scripts either pass (0) or fail (1).
