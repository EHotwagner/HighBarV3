//
// HighBarV3 — gRPC Gateway RPC surface (T013).
//
// Moved from specs/001-grpc-gateway/contracts/service.proto. Once
// this file is under proto/highbar/, breaking changes require a
// MAJOR version bump per Constitution III — i.e., a sibling
// `highbar.v2` package next to `highbar.v1`, not an edit here.
//
// SCHEMA_VERSION: "1.0.0" (T014, FR-022a). The plugin and every
// generated client stub MUST compare the Hello handshake against
// the same compile-time constant (see src/circuit/grpc/SchemaVersion.h
// for the C++ side; clients/*/ mirror it via codegen).

syntax = "proto3";

package highbar.v1;

import "highbar/state.proto";
import "highbar/commands.proto";
import "highbar/callbacks.proto";
import "highbar/common.proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

// The single service HighBarV3 exposes to clients. All RPCs share this
// surface so that observability counters and operational controls live
// on the same auth-and-transport plane as state and commands.
//
// Role model:
//   - `Hello`, `StreamState`, `GetRuntimeCounters`: observer-legal
//     (no token required for StreamState; see FR-013).
//   - `SubmitCommands`, `InvokeCallback`, `Save`, `Load`: AI-role
//     only; require the per-session token in metadata
//     `x-highbar-ai-token` (FR-014).
service HighBarProxy {
  // Version-handshake + session establishment. MUST be the first call
  // on a new channel. Strict-equality schema-version check (FR-022a).
  rpc Hello(HelloRequest) returns (HelloResponse);

  // Server-streaming state feed. First message is a StateUpdate
  // whose payload is a StateSnapshot; subsequent messages are
  // StateDeltas or KeepAlives. Observers may call without a token;
  // the AI role calls this alongside its command stream.
  rpc StreamState(StreamStateRequest) returns (stream highbar.v1.StateUpdate);

  // Client-streaming command submission. AI role only. Bounded queue
  // — overflow returns RESOURCE_EXHAUSTED synchronously (FR-012a).
  rpc SubmitCommands(stream highbar.v1.CommandBatch) returns (CommandAck);

  // Dry-run validation for generated clients. Runs the same validator
  // as SubmitCommands without enqueueing, dispatching, or mutating
  // simulation state.
  rpc ValidateCommandBatch(highbar.v1.CommandBatch) returns (highbar.v1.CommandBatchResult);

  // Schema-level command capability discovery for generated clients.
  rpc GetCommandSchema(CommandSchemaRequest) returns (CommandSchemaResponse);

  // Unit-specific command capability discovery.
  rpc GetUnitCapabilities(UnitCapabilitiesRequest) returns (UnitCapabilitiesResponse);

  // Unary synchronous engine-callback invocation. AI role only.
  // Used by the plugin to forward engine callbacks (e.g., unit-def
  // lookups) that the external AI needs to answer synchronously.
  rpc InvokeCallback(highbar.v1.CallbackRequest) returns (highbar.v1.CallbackResponse);

  // Unary synchronous save-game request. AI role only. Engine needs
  // the response before it continues (architecture doc §Critical
  // Pitfalls #6).
  rpc Save(SaveRequest) returns (SaveResponse);

  // Unary synchronous load-game request. AI role only. Symmetric to
  // Save.
  rpc Load(LoadRequest) returns (LoadResponse);

  // Observability counters (FR-024, clarification Q1). Available to
  // any authenticated client — same token as the AI role. Returns a
  // coherent snapshot of RuntimeCounters; implementations take
  // atomic reads, no global lock.
  rpc GetRuntimeCounters(CountersRequest) returns (CountersResponse);

  // NEW (003-snapshot-arm-coverage).
  //
  // Request an out-of-cadence StateSnapshot. The plugin emits exactly
  // one extra snapshot on the next engine frame following the RPC,
  // regardless of how many concurrent callers made the request. The
  // snapshot arrives on the caller's existing `StreamState`
  // subscription — this RPC does not itself return snapshot data.
  //
  // AI role only (same token as SubmitCommands); observers use the
  // periodic tick or their existing StreamState resume path.
  //
  // Use sparingly — the plugin guards against DoS via the
  // 1-per-frame coalescing described in FR-006.
  rpc RequestSnapshot(RequestSnapshotRequest) returns (RequestSnapshotResponse);
}

// ---------------------------------------------------------------------------
// Hello / handshake
// ---------------------------------------------------------------------------

message HelloRequest {
  // Semver string of the schema the client was compiled against.
  // Strict-equality comparison against the plugin's baked-in schema
  // version (FR-022a). Example: "1.0.0".
  string schema_version = 1;

  // Optional client identifier for logs (e.g., "hb-fsharp-0.4.1",
  // "hb-python-0.1.0"). Never used for auth or routing.
  string client_id = 2;

  // Desired role. If AI, the request MUST carry the AI token in
  // metadata; handshake fails PERMISSION_DENIED otherwise.
  Role role = 3;
}

message HelloResponse {
  // Plugin's own schema version. Always populated, even on mismatch,
  // so the client's error path can surface both versions to the user.
  string schema_version = 1;

  // Session identifier the server assigned to this channel. Carried
  // in logs for correlation.
  string session_id = 2;

  // One-shot static map payload — sent in HelloResponse to avoid
  // re-sending on every StateSnapshot (data-model §1).
  highbar.v1.StaticMap static_map = 3;

  // Current engine frame at handshake completion. Useful for clients
  // estimating wall-clock offsets.
  uint32 current_frame = 4;
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_OBSERVER    = 1;
  ROLE_AI          = 2;
}

// ---------------------------------------------------------------------------
// StreamState
// ---------------------------------------------------------------------------

message StreamStateRequest {
  // Optional resume point. If set and still in the server's ring
  // buffer, the server replays messages starting at seq+1. If set
  // but out of range, the server sends a fresh StateSnapshot and
  // continues with the next monotonic seq (FR-007, FR-008).
  // Unset (0) means "send me a fresh snapshot now."
  uint64 resume_from_seq = 1;
}

// ---------------------------------------------------------------------------
// SubmitCommands
// ---------------------------------------------------------------------------

message CommandAck {
  // Monotonic acknowledgement per CommandBatch consumed. Zero on
  // total rejection (caller should consult RPC status for the
  // specific reason — INVALID_ARGUMENT, RESOURCE_EXHAUSTED, etc.).
  uint64 last_accepted_batch_seq = 1;

  // Cumulative counters for this session; clients can diff between
  // batches to detect late rejections.
  uint64 batches_accepted        = 2;
  uint64 batches_rejected_invalid = 3;
  uint64 batches_rejected_full    = 4;

  // Per-batch structured results. Existing clients can continue to
  // consume the aggregate counters above.
  repeated highbar.v1.CommandBatchResult results = 10;
}

message CommandSchemaRequest {
}

message CommandOptionMask {
  string command_arm = 1;
  uint32 valid_option_mask = 2;
}

message MapLimits {
  float min_x = 1;
  float min_z = 2;
  float max_x = 3;
  float max_z = 4;
}

message CommandSchemaResponse {
  string schema_version = 1;
  repeated string feature_flags = 2;
  repeated string supported_command_arms = 3;
  repeated CommandOptionMask option_masks = 4;
  ValidationMode validation_mode = 5;
  uint32 max_batch_commands = 6;
  uint32 queue_depth = 7;
  uint32 queue_capacity = 8;
  MapLimits map_limits = 9;
  repeated string resource_ids = 10;
}

message UnitCapabilitiesRequest {
  uint32 unit_id = 1;
  UnitGeneration generation = 2;
}

message BuildOption {
  int32 unit_def_id = 1;
  string name = 2;
}

message CustomCommandInfo {
  int32 command_id = 1;
  string name = 2;
  uint32 min_params = 3;
  uint32 max_params = 4;
}

message UnitCapabilitiesResponse {
  uint32 unit_id = 1;
  UnitGeneration generation = 2;
  uint32 unit_def_id = 3;
  string unit_def_name = 4;
  repeated string legal_command_arms = 5;
  repeated BuildOption build_options = 6;
  repeated CustomCommandInfo custom_commands = 7;
  uint32 queue_depth = 8;
  bool busy = 9;
  repeated string feature_flags = 10;
}

service HighBarAdmin {
  rpc GetAdminCapabilities(AdminCapabilitiesRequest) returns (AdminCapabilitiesResponse);
  rpc ValidateAdminAction(AdminAction) returns (AdminActionResult);
  rpc ExecuteAdminAction(AdminAction) returns (AdminActionResult);
}

enum AdminRole {
  ADMIN_ROLE_UNSPECIFIED = 0;
  ADMIN_ROLE_AI = 1;
  ADMIN_ROLE_OBSERVER = 2;
  ADMIN_ROLE_OPERATOR = 3;
  ADMIN_ROLE_ADMIN = 4;
  ADMIN_ROLE_TEST_HARNESS = 5;
}

enum AdminConflictPolicy {
  ADMIN_CONFLICT_POLICY_UNSPECIFIED = 0;
  ADMIN_CONFLICT_REJECT_IF_CONTROLLED = 1;
  ADMIN_CONFLICT_HEARTBEAT_EXISTING_LEASE = 2;
  ADMIN_CONFLICT_RELEASE_EXISTING_LEASE = 3;
}

enum AdminActionStatus {
  ADMIN_ACTION_STATUS_UNSPECIFIED = 0;
  ADMIN_ACTION_ACCEPTED = 1;
  ADMIN_ACTION_EXECUTED = 2;
  ADMIN_ACTION_REJECTED_PERMISSION_DENIED = 3;
  ADMIN_ACTION_REJECTED_DISABLED = 4;
  ADMIN_ACTION_REJECTED_RUN_MODE = 5;
  ADMIN_ACTION_REJECTED_STALE = 6;
  ADMIN_ACTION_REJECTED_CONFLICT = 7;
  ADMIN_ACTION_REJECTED_INVALID_TARGET = 8;
  ADMIN_ACTION_REJECTED_INVALID_VALUE = 9;
  ADMIN_ACTION_NOT_DISPATCHED = 10;
}

enum AdminIssueCode {
  ADMIN_ISSUE_CODE_UNSPECIFIED = 0;
  ADMIN_PERMISSION_DENIED = 1;
  ADMIN_ACTION_DISABLED = 2;
  ADMIN_RUN_MODE_FORBIDS_CHEATS = 3;
  ADMIN_STALE_SNAPSHOT_EPOCH = 4;
  ADMIN_CONTROL_CONFLICT = 5;
  ADMIN_INVALID_SPEED = 6;
  ADMIN_INVALID_SPEED_RANGE = 7;
  ADMIN_INVALID_RESOURCE = 8;
  ADMIN_INVALID_AMOUNT = 9;
  ADMIN_UNKNOWN_UNIT_DEF = 10;
  ADMIN_POSITION_OUT_OF_MAP = 11;
  ADMIN_INVALID_TEAM = 12;
  ADMIN_ENGINE_NOT_READY = 13;
  ADMIN_ISSUE_ACTION_NOT_DISPATCHED = 14;
}

message AdminIssue {
  AdminIssueCode code = 1;
  string field_path = 2;
  string detail = 3;
  RetryHint retry_hint = 4;
}

message PauseAction {
  bool paused = 1;
}

message SpeedAction {
  float speed = 1;
}

message CheatPolicyAction {
  bool enabled = 1;
}

message ResourceGrantAction {
  int32 team_id = 1;
  int32 resource_id = 2;
  float amount = 3;
}

message UnitSpawnAction {
  int32 team_id = 1;
  int32 unit_def_id = 2;
  Vector3 position = 3;
  int32 facing = 4;
}

message LifecycleAction {
  string command = 1;
}

message AdminAction {
  uint64 action_seq = 1;
  uint64 client_action_id = 2;
  uint32 based_on_frame = 3;
  uint64 based_on_state_seq = 4;
  AdminConflictPolicy conflict_policy = 5;
  string reason = 6;

  oneof action {
    PauseAction pause = 10;
    SpeedAction global_speed = 11;
    CheatPolicyAction cheat_policy = 12;
    ResourceGrantAction resource_grant = 13;
    UnitSpawnAction unit_spawn = 14;
    LifecycleAction lifecycle = 15;
  }
}

message AdminLease {
  string control = 1;
  string owner_client_id = 2;
  AdminRole owner_role = 3;
  uint32 acquired_frame = 4;
  uint32 last_heartbeat_frame = 5;
  uint32 expires_frame = 6;
  uint32 released_frame = 7;
  string release_reason = 8;
}

message AdminActionResult {
  uint64 action_seq = 1;
  uint64 client_action_id = 2;
  AdminActionStatus status = 3;
  repeated AdminIssue issues = 4;
  AdminLease lease = 5;
  uint32 frame = 6;
  uint64 state_seq = 7;
  bool dry_run = 8;
}

message AdminCapabilitiesRequest {
}

message AdminCapabilitiesResponse {
  bool enabled = 1;
  repeated AdminRole roles = 2;
  repeated string supported_actions = 3;
  repeated string feature_flags = 4;
}

// ---------------------------------------------------------------------------
// Save / Load
// ---------------------------------------------------------------------------
//
// These carry opaque blobs on purpose. The plugin forwards engine-
// provided save data to the AI client and returns the client's
// reply back to the engine. The AI client decides the encoding of
// its own persisted state; the plugin never parses the blob.

message SaveRequest {
  bytes engine_state = 1;  // opaque; engine-provided
}

message SaveResponse {
  bytes client_state = 1;  // opaque; client-provided
}

message LoadRequest {
  bytes engine_state = 1;  // opaque; engine-provided
  bytes client_state = 2;  // opaque; from a prior Save
}

message LoadResponse {
  // Empty; non-empty on future extension. Engine needs synchronous
  // completion acknowledgement, not a payload.
}

// ---------------------------------------------------------------------------
// Runtime counters
// ---------------------------------------------------------------------------

message CountersRequest {
  // Empty. Future extensions may select a counter subset.
}

message CountersResponse {
  uint32 subscriber_count                    = 1;
  repeated uint32 per_subscriber_queue_depth = 2;
  uint64 cumulative_dropped_subscribers      = 3;
  uint64 frame_flush_time_us_p99             = 4;
  uint32 command_queue_depth                 = 5;
  uint64 command_submissions_rejected_resource_exhausted = 6;
  uint64 command_submissions_rejected_invalid_argument   = 7;

  // Plugin uptime since bind, in engine frames.
  uint32 frames_since_bind = 8;
}

// ---------------------------------------------------------------------------
// RequestSnapshot (003-snapshot-arm-coverage)
// ---------------------------------------------------------------------------

message RequestSnapshotRequest {
  // Empty. Reserved for future extensions (e.g., per-team restriction
  // if multi-team subscriptions ever land).
}

message RequestSnapshotResponse {
  // Engine frame the plugin committed to emit the forced snapshot
  // on. Clients MAY use this to correlate the forced snapshot on
  // their StreamState stream (match `StateSnapshot.frame_number ==
  // scheduled_frame`). Zero if the gateway was not Healthy at
  // dispatch time — the RPC then returns with status code
  // FAILED_PRECONDITION.
  uint32 scheduled_frame = 1;
}
