}

message GroupRemoveUnitCommand {
  int32 unit_id = 1;
  int32 group_id = 2;
}

// -- Pathfinding --

message InitPathCommand {
  Vector3 start_position = 1;
  Vector3 end_position = 2;
  int32 path_type = 3;
