// Ported verbatim from HighBarV2 (/proto/highbar/commands.proto).
// Only change vs V2: `package highbar;` → `package highbar.v1;` to
// align with plan.md §Technical Context (versioned proto package).

syntax = "proto3";

package highbar.v1;

import "highbar/common.proto";

// Container for all AI command types (97 variants).
message AICommand {
  oneof command {
    // Drawing commands (1-3)
    DrawAddPointCommand draw_add_point = 1;
    DrawAddLineCommand draw_add_line = 2;
    DrawRemovePointCommand draw_remove_point = 3;

    // Chat/Resources (4-9)
    SendTextMessageCommand send_text_message = 4;
    SetLastPosMessageCommand set_last_pos_message = 5;
    SendResourcesCommand send_resources = 6;
    SetMyIncomeShareDirectCommand set_my_income_share_direct = 7;
    SetShareLevelCommand set_share_level = 8;
    PauseTeamCommand pause_team = 9;

    // Groups (12-15)
    GroupAddUnitCommand group_add_unit = 12;
    GroupRemoveUnitCommand group_remove_unit = 13;

    // Pathfinding (16-19)
    InitPathCommand init_path = 16;
    GetApproxLengthCommand get_approx_length = 17;
    GetNextWaypointCommand get_next_waypoint = 18;
    FreePathCommand free_path = 19;

    // Cheats (20, 79)
    GiveMeCommand give_me = 20;
    GiveMeNewUnitCommand give_me_new_unit = 79;

    // Lua (21, 96)
    CallLuaRulesCommand call_lua_rules = 21;
    CallLuaUICommand call_lua_ui = 96;

    // Drawer Figures (22-34)
    CreateSplineFigureCommand create_spline_figure = 22;
    CreateLineFigureCommand create_line_figure = 23;
    SetFigurePositionCommand set_figure_position = 24;
    SetFigureColorCommand set_figure_color = 25;
    RemoveFigureCommand remove_figure = 26;
    DrawUnitCommand draw_unit = 27;

    // Unit Commands (35-78)
    BuildUnitCommand build_unit = 35;
    StopCommand stop = 36;
    WaitCommand wait = 37;
    TimedWaitCommand timed_wait = 38;
    SquadWaitCommand squad_wait = 39;
    DeathWaitCommand death_wait = 40;
    GatherWaitCommand gather_wait = 41;
    MoveUnitCommand move_unit = 42;
    PatrolCommand patrol = 43;
    FightCommand fight = 44;
    AttackCommand attack = 45;
    AttackAreaCommand attack_area = 46;
    GuardCommand guard = 47;
    RepairCommand repair = 48;
    ReclaimUnitCommand reclaim_unit = 49;
    ReclaimAreaCommand reclaim_area = 50;
    ReclaimInAreaCommand reclaim_in_area = 51;
    ReclaimFeatureCommand reclaim_feature = 52;
    RestoreAreaCommand restore_area = 53;
    ResurrectCommand resurrect = 54;
    ResurrectInAreaCommand resurrect_in_area = 55;
    CaptureCommand capture = 56;
    CaptureAreaCommand capture_area = 57;
    SetBaseCommand set_base = 58;
    SelfDestructCommand self_destruct = 59;
    LoadUnitsCommand load_units = 60;
    LoadUnitsAreaCommand load_units_area = 61;
    LoadOntoCommand load_onto = 62;
    UnloadUnitCommand unload_unit = 63;
    UnloadUnitsAreaCommand unload_units_area = 64;
    SetWantedMaxSpeedCommand set_wanted_max_speed = 65;
    StockpileCommand stockpile = 66;
    DGunCommand dgun = 67;
    CustomCommand custom = 68;
    SetOnOffCommand set_on_off = 69;
    SetRepeatCommand set_repeat = 70;
    SetMoveStateCommand set_move_state = 71;
    SetFireStateCommand set_fire_state = 72;
    SetTrajectoryCommand set_trajectory = 73;
    SetAutoRepairLevelCommand set_auto_repair_level = 74;
    SetIdleModeCommand set_idle_mode = 75;
  }
}

