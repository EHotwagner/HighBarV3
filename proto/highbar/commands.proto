  float amount = 2;
  int32 receiving_team_id = 3;
}

message SetMyIncomeShareDirectCommand {
  int32 resource_id = 1;
  float share = 2;
}

message SetShareLevelCommand {
  int32 resource_id = 1;
  float share_level = 2;
}

message PauseTeamCommand {
