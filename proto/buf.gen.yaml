version: v2
clean: false
plugins:
  # C++ (plugin side) → consumed by the highbar_proto static lib in CMakeLists.txt
  - remote: buf.build/protocolbuffers/cpp
    out: ../build/gen
  - remote: buf.build/grpc/cpp
    out: ../build/gen

  # C# (F# client) → consumed by clients/fsharp/HighBar.Client.fsproj
  - remote: buf.build/protocolbuffers/csharp
    out: ../build/gen/csharp
  - remote: buf.build/grpc/csharp
    out: ../build/gen/csharp

  # Python → consumed by clients/python/highbar_client/. Buf places
  # stubs under <out>/highbar/v1/ from the proto's `package highbar.v1`.
  # T032 — committed under highbar_client/highbar/v1/ matching the
  # `from .highbar.v1 import ...` imports already in commands.py /
  # session.py / state_stream.py.
  - remote: buf.build/protocolbuffers/python
    out: ../clients/python/highbar_client
  - remote: buf.build/grpc/python
    out: ../clients/python/highbar_client
