# SPDX-License-Identifier: GPL-2.0-only
#
# HighBarV3 — Python client package (T084).
#
# Targets Python 3.11+. gRPC stubs are regenerated from proto/highbar/
# via grpcio-tools at build time — there is no committed generated
# code under highbar_client/highbar_v1_pb2* (those appear in the
# build/ tree after `buf generate` or the inline grpc_tools call in
# __init__.py's dev-install path).

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "highbar-client"
version = "0.1.0"
description = "HighBarV3 gRPC client for Python — observer + AI roles."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-2.0-only" }
authors = [
    { name = "HighBarV3 contributors" }
]
dependencies = [
    "grpcio >= 1.62",
    # 003-snapshot-arm-coverage T028 — grpcio-tools 1.71 emits gencode
    # 6.x which requires protobuf runtime >= 6.x. Pin to the 6.x line
    # (still compatible with pre-003 stubs that used older gencode).
    "protobuf >= 6.0, < 7",
]

[project.optional-dependencies]
dev = [
    # 003-snapshot-arm-coverage T028 — pinned to the 1.72..1.73 window
    # whose bundled libprotoc emits gencode 6.x compatible with the
    # protobuf 6.x runtime our project depends on.
    "grpcio-tools >= 1.72.1, < 1.74",
    "pytest >= 8.0",
    "pytest-asyncio >= 0.23",
]

[project.scripts]
hb-observer-py = "highbar_client.samples.observer:main"
hb-ai-client-py = "highbar_client.samples.ai_client:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["highbar_client*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
